forms:
  initiatives_form:
    label: Initiatives
    default_table: initiatives
    elements:
      name:
        type: string
        label: Name
      description:
        type: string
        label: Description
        appearance: multiline
      responsible_person:
        type: select_one
        appearance: dropdown
        label: Responsible Person
        parameters:
          source_table: people
          value_column: id
          label_column: name
      tag_groups:
        type: subform
        label: Tag Groups
        parameters:
          source_table: tag_groups
          value_column: id
          label_column: name
      status:
        type: string
        label: Status
      parents:
        type: select_multiple
        appearance: dropdown
        label: Parent Initiatives
        parameters:
          source_table: initiatives
          value_column: id
          label_column: name
        store:
          link_table: initiative_initiative_links
          source_field: child_id
          target_field: parent_id
          orientation: self
      children:
        type: select_multiple
        appearance: dropdown
        label: Child Initiatives
        parameters:
          source_table: initiatives
          value_column: id
          label_column: name
        store:
          link_table: initiative_initiative_links
          source_field: parent_id
          target_field: child_id
          orientation: self
      activities_links:
        type: select_multiple
        appearance: dropdown
        label: Linked Activities
        parameters:
          source_table: activities
          value_column: id
          label_column: name
        store:
          link_table: activity_initiative_links
          source_field: initiative_id
          target_field: activity_id
          orientation: forward
      contracts_links:
        type: select_multiple
        appearance: dropdown
        label: Linked Contracts
        parameters:
          source_table: contracts
          value_column: id
          label_column: name
        store:
          link_table: contract_initiative_links
          source_field: initiative_id
          target_field: contract_id
          orientation: forward
    meta:
      id:
        strategy: uuid
        editable: false
      version:
        strategy: increment
      timestamp:
        strategy: now
      created_by:
        strategy: current_user

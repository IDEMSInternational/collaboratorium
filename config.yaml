title: Collaboratorium
node_tables:
- initiatives
- people
- organisations
- activities
- contracts
- tag_groups
network_vis:
  layout:
    name: cose-bilkent
  stylesheet:
  - selector: node
    style:
      label: data(label)
      text-valign: center
      text-halign: center
      font-size: 12px
      width: 60px
      height: 60px
  - selector: edge
    style:
      curve-style: bezier
      target-arrow-shape: triangle
      # label: data(label)
      font-size: 10px
  - selector: .initiatives
    style:
      background-color: '#ff6900'
      shape: round-rectangle
      text-wrap: wrap
      text-max-width: 60px
  - selector: .people
    style:
      background-color: '#fcb900'
      shape: ellipse
      text-wrap: wrap
      text-max-width: 60px
  - selector: .organisations
    style:
      background-color: '#649ba3'
      shape: hexagon
      text-wrap: wrap
      text-max-width: 60px
  - selector: .activities
    style:
      background-color: '#9b51e0'
      shape: rectangle
      text-wrap: wrap
      text-max-width: 60px
  - selector: .contracts
    style:
      background-color: '#98FB98'
      shape: round-rectangle
      text-wrap: wrap
      text-max-width: 60px
  - selector: .tag_groups
    style:
      background-color: '#ff6900'
      shape: ellipse
      text-wrap: wrap
      text-max-width: 60px
tables:
  initiatives:
    fields:
      id: integer
      version: integer
      name: string
      description: string
      responsible_person: integer
      timestamp: timestamp
      tag_groups: json
      status: string
      created_by: integer
  people:
    fields:

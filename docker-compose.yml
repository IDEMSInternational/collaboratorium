services:
  proxy:
    image: jonasal/nginx-certbot:6.0.1-nginx1.29.1
    depends_on:
      - collaboratorium
      - nextcloud
      - collabora
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?}
      DOMAIN: ${DOMAIN:?}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/user_conf.d
      USE_LOCAL_CA: ${USE_LOCAL_CA}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx:/etc/nginx/templates
      - letsencrypt:/etc/letsencrypt
      - nextcloud_data:/var/www/html:ro

  collaboratorium:
    build: .
    image: collaboratorium:latest
    depends_on:
      - nextcloud
    environment:
      NEXTCLOUD_APP_PASSWORD: ${NEXTCLOUD_APP_PASSWORD:-}
    volumes:
      - ./database.db:/app/database.db
      - ./analytics.db:/app/analytics.db
      - ./config.yaml:/app/config.yaml:ro
      - ./schema.dbml:/app/schema.dbml:ro
      - ./.env:/app/.env
    restart: unless-stopped

  nextcloud-db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD:-nextcloud_root_pass}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${NEXTCLOUD_DB_USER:-nextcloud}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - nextcloud_db_data:/var/lib/mysql
    restart: unless-stopped

  nextcloud:
    image: nextcloud:32-fpm
    depends_on:
      nextcloud-db:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?}
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${NEXTCLOUD_DB_USER:-nextcloud}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:?}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:?}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?}
      NEXTCLOUD_TRUSTED_DOMAINS: "collabora.${DOMAIN} dash.${DOMAIN} nextcloud.${DOMAIN} ${DOMAIN:?}"
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_config:/var/www/html/config
      - ./nextcloud_hooks/post-init.d:/docker-entrypoint-hooks.d/post-installation
    restart: unless-stopped
    extra_hosts:
      - "collabora.${DOMAIN:?}:host-gateway"

  collabora:
    image: collabora/code:latest
    container_name: collabora
    ports:
      - "9980:9980"
    environment:
      # Configure Collabora to work behind Nginx reverse proxy on subdomain
      server_name: collabora.${DOMAIN:?}
      aliasgroup1: https://nextcloud.${DOMAIN:?}
      DONT_GEN_SSL_CERT: "true"
      # Collabora runs without SSL since Nginx handles it
      extra_params: >
        --o:ssl.enable=false
        --o:ssl.termination=true
        --o:security.header_frame_ancestors=https://nextcloud.${DOMAIN:?}
        --o:storage.wopi.host=nextcloud.${DOMAIN:?}
        --o:security.enable_seccomp=false
    cap_add:
      - MKNOD
      - SYS_ADMIN
    restart: unless-stopped
    extra_hosts:
      - "nextcloud.${DOMAIN:?}:host-gateway"

volumes:
  letsencrypt:
    driver: local
  nextcloud_db_data:
    driver: local
  nextcloud_data:
    driver: local
  nextcloud_config:
    driver: local

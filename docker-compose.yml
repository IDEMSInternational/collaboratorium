services:
  proxy:
    depends_on:
      - collaboratorium
      - nextcloud
      - collabora
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?}
      DOMAIN: ${DOMAIN:?}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/user_conf.d
      USE_LOCAL_CA: ${USE_LOCAL_CA}
    image: jonasal/nginx-certbot:6.0.1-nginx1.29.1
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx:/etc/nginx/templates
      - letsencrypt:/etc/letsencrypt
      - nextcloud_data:/var/www/html:ro

  collaboratorium:
    build: .
    image: collaboratorium:latest
    depends_on:
      - nextcloud
    environment:
      NEXTCLOUD_APP_PASSWORD: ${NEXTCLOUD_APP_PASSWORD:-}
    # ports:
    #   - "8050:8050"
    volumes:
      # Bind-mount the host database file into the container so data persists
      - ./database.db:/app/database.db
      - ./analytics.db:/app/analytics.db
      # Also mount config so container and host share the same config file
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env
    restart: unless-stopped

  # NextCloud instance with MariaDB backend
  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD:-nextcloud_root_pass}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${NEXTCLOUD_DB_USER:-nextcloud}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-nextcloud_pass}
    volumes:
      - nextcloud_db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - default

  nextcloud:
    image: nextcloud:31-fpm
    container_name: nextcloud
    depends_on:
      - nextcloud-db
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${NEXTCLOUD_DB_USER:-nextcloud}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-nextcloud_pass}
      # This is very important and will not work if NEXTCLOUD_ADMIN_USER/_PASSWORD is defined
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.${DOMAIN:-localhost}
      TRUSTED_PROXIES: 127.0.0.1 proxy nginx collaboratorium-proxy-1 localhost
      # OVERWRITEPROTOCOL: https
      # OVERWRITEHOST: "nextcloud.${DOMAIN:-localhost}"
      # OVERWRITEWEBROOT: "/"
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_config:/var/www/html/config
    restart: unless-stopped
    networks:
      default:
        aliases:
          - ${DOMAIN:-localhost}

  # Collabora Online (LibreOffice in the Cloud)
  collabora:
    image: collabora/code:latest
    container_name: collabora
    ports:
      - "9980:9980"
    environment:
      # Configure Collabora to work behind Nginx reverse proxy on subdomain
      server_name: collabora.${DOMAIN:-localhost}
      aliasgroup1: https://nextcloud.${DOMAIN:-localhost}
      DONT_GEN_SSL_CERT: "true"
      # Collabora runs without SSL since Nginx handles it
      extra_params: >
        --o:ssl.enable=false
        --o:ssl.termination=true
        --o:security.header_frame_ancestors=https://nextcloud.${DOMAIN:-localhost}
        --o:storage.wopi.host=collabora.${DOMAIN:-localhost}
        --o:security.enable_seccomp=false
    cap_add:
      - MKNOD
    restart: unless-stopped
    networks:
      - default

volumes:
  letsencrypt:
    driver: local
  nextcloud_db_data:
    driver: local
  nextcloud_data:
    driver: local
  nextcloud_config:
    driver: local
